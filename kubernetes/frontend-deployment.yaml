apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-nginx-app
  labels:
    app: react-nginx-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-nginx-app
  template:
    metadata:
      labels:
        app: react-nginx-app
    spec:
      containers:
        - name: react-nginx-container
          image: ankya2207/react-nginx-app:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
